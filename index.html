 <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XXS Corporation By Candra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            color: #f5f5f7;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            position: relative;
            /* ANTI DOUBLE TAP ZOOM */
            touch-action: manipulation;
        }
        
        /* BACKGROUND ITACHI - DIOPTIMASI */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://i.imgur.com/XhesgxQ.jpg') center/cover;
            filter: brightness(0.55) contrast(1.1) saturate(1.2);
            z-index: -2;
            will-change: transform; /* OPTIMASI GPU */
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 20%, rgba(139, 0, 0, 0.25), rgba(0,0,0,0.5));
            z-index: -1;
        }
        
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 60px 20px 100px;
            position: relative;
            z-index: 1;
        }
        
       .profile { text-align: center; margin-bottom: 50px; }
       
       .profile-video {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 20px;
            object-fit: cover;
            border: 3px solid #8B0000;
            box-shadow: 0 0 40px rgba(139, 0, 0, 0.8), 0 0 80px rgba(139, 0, 0, 0.4);
            /* OPTIMASI VIDEO */
            transform: translateZ(0);
        }
        
       .name {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(139, 0, 0, 0.5);
        }
       .desc {
            font-size: 17px;
            color: #d1d1d6;
            font-weight: 400;
            line-height: 1.4;
        }
        
       .link-card {
            display: flex;
            align-items: center;
            background: rgba(28, 28, 30, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 0, 0, 0.2);
            padding: 18px 20px;
            margin: 12px 0;
            border-radius: 12px;
            text-decoration: none;
            color: #f5f5f7;
            transition: transform 0.2s ease, background 0.2s ease;
            /* ANTI LAG */
            will-change: transform;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* HILANGIN FLASH BIRU DI HP */
        }
       .link-card:active {
            transform: scale(0.98); /* FEEDBACK PAS DIKLIK */
        }
       .link-card:hover {
            background: rgba(44, 44, 46, 0.9);
            box-shadow: 0 8px 25px rgba(139, 0, 0, 0.4);
            border-color: #8B0000;
        }
       .link-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-right: 16px;
            flex-shrink: 0;
        }
       .link-text { flex: 1; }
       .link-text h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 2px;
        }
       .link-text p {
            font-size: 14px;
            color: #a1a1a6;
            font-weight: 400;
        }
       .chevron {
            color: #86868b;
            font-size: 14px;
        }
        
       .wa { background: linear-gradient(135deg, #25D366, #128C7E); color: white; }
       .ig { background: linear-gradient(135deg, #F58529, #DD2A7B, #8134AF); color: white; }
       .tt { background: #000; color: white; border: 1px solid #333; }
        
       .footer {
            text-align: center;
            margin-top: 60px;
            font-size: 12px;
            color: #86868b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <!-- VIDEO DIOPTIMASI -->
            <video class="profile-video" autoplay loop muted playsinline preload="metadata">
                <source src="https://i.imgur.com/3cEyqsk.mp4" type="video/mp4">
                <img src="https://i.imgur.com/9pNffgr.png" class="profile-video" alt="Itachi">
            </video>
            
            <h1 class="name">Candra Uhuy</h1>
            <p class="desc">My Sosmed🐦‍⬛<br> Jawa Barat, Indonesia</p>
        </div>

        <!-- LINK UDAH ANTI SPAM + BUKA TAB BARU -->
        <a href="https://whatsapp.com/channel/0029VbAvaauIiRoo5eeAv23y" class="link-card" target="_blank" rel="noopener noreferrer">
            <div class="link-icon wa"><i class="fab fa-whatsapp"></i></div>
            <div class="link-text">
                <h3>Saluran WhatsApp</h3>
                <p>Join saluran resmi kami</p>
            </div>
            <i class="fas fa-chevron-right chevron"></i>
        </a>

        <a href="https://www.instagram.com/candra_jecxoe217?igsh=MTBwMTloY2U4dXBmbw==" class="link-card" target="_blank" rel="noopener noreferrer">
            <div class="link-icon ig"><i class="fab fa-instagram"></i></div>
            <div class="link-text">
                <h3>Instagram</h3>
                <p>@Candra Jecxoe</p>
            </div>
            <i class="fas fa-chevron-right chevron"></i>
        </a>

        <a href="https://tiktok.com/@arinylhos" class="link-card" target="_blank" rel="noopener noreferrer">
            <div class="link-icon tt"><i class="fab fa-tiktok"></i></div>
            <div class="link-text">
                <h3>TikTok</h3>
                <p>@Candra Jecxoe</p>
            </div>
            <i class="fas fa-chevron-right chevron"></i>
        </a>

        <div class="footer">
            <p>© 2026 XXS Corporation By Candra</p>
        </div>
    </div>

    <!-- ANTI DOUBLE CLICK SPAM -->
    <script>
        document.querySelectorAll('.link-card').forEach(link => {
            let clicked = false;
            link.addEventListener('click', function(e) {
                if (clicked) {
                    e.preventDefault();
                    return;
                }
                clicked = true;
                setTimeout(() => { clicked = false; }, 1000); // Cooldown 1 detik
            });
        });
    </script>
</body>
</html>
